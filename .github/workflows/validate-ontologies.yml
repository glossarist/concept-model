name: validate-ontologies

on:
  push:
    branches: [ main ]
    paths:
      - 'ontologies/**'
      - 'lib/**'
      - 'exe/validate-ontologies'
      - '.github/workflows/validate-ontologies.yml'
  pull_request:
    paths:
      - 'ontologies/**'
      - 'lib/**'
      - 'exe/validate-ontologies'
      - '.github/workflows/validate-ontologies.yml'

jobs:
  validate:
    name: Validate ontology files (Turtle parse + cross-refs)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Validate Turtle files
        run: bundle exec exe/validate-ontologies
