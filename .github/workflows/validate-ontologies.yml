name: validate-ontologies

on:
  push:
    branches: [ main ]
    paths:
      - 'ontologies/**'
      - 'schemas/**'
      - 'scripts/validate-ontologies.py'
  pull_request:
    paths:
      - 'ontologies/**'
      - 'schemas/**'
      - 'scripts/validate-ontologies.py'

jobs:
  validate:
    name: Validate ontology files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install rdflib
        run: pip install rdflib

      - name: Validate Turtle files
        run: python scripts/validate-ontologies.py
