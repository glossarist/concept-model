# 21 — Partitive Hyperedge (open enumeration)
#
# An open partitive decomposition: the comprehensive concept has AT
# LEAST the listed parts; other parts may exist but are not encoded.
#
# Source analogue: VIM 2012 Fig. A.1 — "system of quantities" (1.3)
# has at least "base quantity" (1.4), "derived quantity" (1.5), and
# "quantity equation" (1.22) as parts. Other quantities that belong
# to the system are not enumerated.

