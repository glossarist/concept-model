%YAML 1.1
# yaml-language-server: $schema=http://json-schema.org/draft-07/schema
---
$id: "https://github.com/glossarist/concept-model/v3/localized-concept"
title: YAML Schema for LocalizedConcept model (v3)
description: |
  A schema for glossarist localized concept model V3.
type: object
properties:
  id:
    type: string
    format: uuid
    description: A unique identifier of the localized concept
    examples:
      - '3'
      - 12969ded-ba28-48de-b009-1f1140236c60
  data:
    type: object
    description: The data related to the localized concept
    properties:
      language_code:
        $ref: "#/$defs/language_code"
      entry_status:
        $ref: "#/$defs/entry_status"
      classification:
        type: string
        description: Classification of the localized concept entry.
        examples:
          - admitted
          - preferred
      review_type:
        type: string
        description: Type of review for this entry.
        examples:
          - editorial
          - substantive
      designations:
        type: array
        description: List of designations (terms) of the concept
        items:
          anyOf:
            - $ref: "#/$defs/designation_expression"
            - $ref: "#/$defs/designation_abbreviation"
            - $ref: "#/$defs/designation_symbol"
            - $ref: "#/$defs/designation_graphical_symbol"
            - $ref: "#/$defs/designation_letter_symbol"
            - $ref: "#/$defs/designation_prefix"
            - $ref: "#/$defs/designation_suffix"

      definition:
        type: array
        items:
          $ref: "#/$defs/detailed_definition"

      domain:
        type: string
        description: Domain or subject area of the localized concept.
        example: 'application module: Aec_service_life_arm'

      notes:
        type: array
        items:
          $ref: "#/$defs/detailed_definition"
        description: List of notes for current localization

      annotations:
        type: array
        items:
          $ref: "#/$defs/detailed_definition"
        description: >-
          Editorial annotations about the definition or entry itself.
          Distinct from notes — annotations comment on how to interpret
          the definition (e.g. term substitutions, clarifications),
          while notes supplement the concept.

      examples:
        type: array
        items:
          $ref: "#/$defs/detailed_definition"
        description: List of examples for current localization

      non_verbal:
        type: array
        items:
          $ref: "#/$defs/non_verbal_rep"
        description: A non-verbal representation used to help define the term.

      sources:
        type: array
        description: List of all sources for current localization
        items:
          $ref: "#/$defs/concept_source"

      authoritative_source:
        $ref: "#/$defs/concept_source"
        description: The authoritative source for current localization

      dates:
        type: array
        items:
          $ref: "#/$defs/concept_date"
        description: Dates relevant to this localized concept.

      related:
        type: array
        items:
          $ref: "#/$defs/related_concept"
        description: Zero or more related concepts at the localization level.

      references:
        type: array
        items:
          $ref: "#/$defs/reference"
        description: Typed references at the localization level.

      review_date:
        type: string
        format: date-time
        description: MANAGEMENT — Date when a review was conducted.

      review_decision_date:
        type: string
        format: date-time
        description: MANAGEMENT — Date when a review decision was made.

      review_decision_event:
        type: string
        description: MANAGEMENT — Description of the review decision event.

      release:
        type: string
        description: Release version of this localized entry.

      lineage_source_similarity:
        type: integer
        description: Percentage similarity to the lineage source (0-100).

  status:
    $ref: "#/$defs/concept_status"

  date_accepted:
    type: string
    format: date-time
    description: Date and time when the localized concept was accepted.
    examples:
      - "2021-05-01T00:00:00+00:00"

$defs:
  # Base Designation class
  designation_base:
    type: object
    description: Base properties for all designations
    properties:
      normative_status:
        $ref: "#/$defs/normative_status"
      absent:
        type: boolean
        description: Indication that the term designation is missing.
      field_of_application:
        type: string
        description: Text used to disambiguate a designation by describing the subject field.
      usage_info:
        type: string
        description: Text used to disambiguate a designation by describing how it is used.
      geographical_area:
        type: array
        items:
          $ref: "#/$defs/iso3166_code"
        description: The geographic area in which the managed term is known under this designation.
      sources:
        type: array
        items:
          $ref: "#/$defs/concept_source"
        description: Bibliographic references for this designation.
      term_type:
        $ref: "#/$defs/term_type"
      related:
        type: array
        items:
          $ref: "#/$defs/designation_relationship"
        description: Designation-level relationships (e.g. abbreviated_form_for, short_form_for).
      register:
        $ref: "#/$defs/register"

  # Expression Designation
  designation_expression:
    allOf:
      - $ref: "#/$defs/designation_base"
      - type: object
        additionalProperties: false
        description: Expression designation for a localized term
        properties:
          type:
            type: string
            description: Type of the designation
            const: expression
          designation:
            type: string
            description: The localized term
            examples:
              - geometric node
              - entity
          language:
            $ref: "#/$defs/iso639_three_char_code"
          script:
            $ref: "#/$defs/iso15924_code"
          system:
            $ref: "#/$defs/iso24229_code"
          international:
            type: boolean
            description: Whether the designation is valid across all regions.
          pronunciation:
            type: array
            items:
              $ref: "#/$defs/pronunciation"
            description: Pronunciation guides for the designation.
          grammar_info:
            type: array
            items:
              $ref: "#/$defs/grammar_info"
            description: Grammatical information about the designation.
          prefix:
            type: string
            description: A prefix that attaches to the designation.

  # Abbreviation Designation
  designation_abbreviation:
    allOf:
      - $ref: "#/$defs/designation_base"
      - type: object
        additionalProperties: false
        description: Abbreviation designation for a localized term
        properties:
          type:
            type: string
            description: Type of the designation
            const: abbreviation
          designation:
            type: string
            description: The abbreviation for localized term
            examples:
              - j
              - ATS
          language:
            $ref: "#/$defs/iso639_three_char_code"
          script:
            $ref: "#/$defs/iso15924_code"
          system:
            $ref: "#/$defs/iso24229_code"
          international:
            type: boolean
            description: Whether an abbreviation is the same across languages.
          pronunciation:
            type: array
            items:
              $ref: "#/$defs/pronunciation"
          grammar_info:
            type: array
            items:
              $ref: "#/$defs/grammar_info"
          prefix:
            type: string
          abbreviation_type:
            $ref: "#/$defs/abbreviation_type"

  # Symbol Designation
  designation_symbol:
    allOf:
      - $ref: "#/$defs/designation_base"
      - type: object
        additionalProperties: false
        description: Symbol designation for a localized term
        properties:
          type:
            type: string
            description: Type of the designation
            const: symbol
          international:
            type: boolean
            description: Whether the designation is valid across all regions.
          designation:
            type: string
            description: The symbol used to represent the localized term
            examples:
              - ♔
              - M

  # Graphical Symbol Designation
  designation_graphical_symbol:
    allOf:
      - $ref: "#/$defs/designation_base"
      - type: object
        additionalProperties: false
        description: Graphical Symbol designation for a localized term
        properties:
          type:
            type: string
            description: Type of the designation
            const: graphical_symbol
          international:
            type: boolean
            description: Whether the designation is valid across all regions.
          designation:
            type: string
            description: The symbol used to represent the localized term
            examples:
              - ♕
              - ♖
          text:
            type: string
            description: Alt text description of the graphical symbol.
          image:
            type: string
            description: URI or path to the graphical symbol image.

  # Letter Symbol Designation
  designation_letter_symbol:
    allOf:
      - $ref: "#/$defs/designation_base"
      - type: object
        additionalProperties: false
        description: Letter Symbol designation for a localized term
        properties:
          type:
            type: string
            description: Type of the designation
            const: letter_symbol
          international:
            type: boolean
            description: Whether the designation is valid across all regions.
          designation:
            type: string
            description: The symbol used to represent the localized term
            examples:
              - C
              - L
          text:
            type: string
            description: The letter text of the symbol.

  # Prefix Designation
  designation_prefix:
    allOf:
      - $ref: "#/$defs/designation_base"
      - type: object
        additionalProperties: false
        description: Prefix designation for a localized term
        properties:
          type:
            type: string
            description: Type of the designation
            const: prefix
          designation:
            type: string
            description: The prefix used to represent the localized term

  # Suffix Designation
  designation_suffix:
    allOf:
      - $ref: "#/$defs/designation_base"
      - type: object
        additionalProperties: false
        description: Suffix designation for a localized term
        properties:
          type:
            type: string
            description: Type of the designation
            const: suffix
          designation:
            type: string
            description: The suffix used to represent the localized term

  # Pronunciation
  pronunciation:
    type: object
    description: A pronunciation guide for a designation.
    properties:
      content:
        type: string
        description: The phonetic transcription text.
      language:
        $ref: "#/$defs/iso639_three_char_code"
      script:
        $ref: "#/$defs/iso15924_code"
      system:
        type: string
        description: The transcription system (e.g. IPA, romaji).
      country:
        $ref: "#/$defs/iso3166_code"

  # Enums and Types
  abbreviation_type:
    type: string
    description: Type of abbreviation, according to how it is formed.
    enum:
      - truncation
      - acronym
      - initialism
      - other

  normative_status:
    type: string
    description: Normative status of a designation of a term.
    enum:
      - preferred
      - admitted
      - deprecated
      - superseded

  entry_status:
    type: string
    description: Status of the localized concept entry.
    enum:
      - valid
      - not_valid
      - superseded
      - retired

  term_type:
    type: string
    description: ISO 12620 term type classification.
    enum:
      - full_form
      - variant
      - entry_term
      - common_name
      - synonym
      - transliterated_form
      - transcribed_form
      - scientific_name
      - short_form
      - acronym
      - initialism
      - abbreviation
      - truncation
      - symbol
      - equation
      - formula
      - reference_symbol
      - figure_symbol
      - graphic_symbol
      - letter_symbol
      - roman_numeral
      - mathematical_expression
      - code
      - phrase
      - clipped_term
      - logical_expression
      - internationalism
      - international_scientific_term
      - part_number
      - phraseological_unit
      - shortcut
      - sku
      - standard_text
      - synonymous_phrase

  grammar_gender:
    type: string
    description: The grammatical gender of the designation.
    enum:
      - masculine
      - feminine
      - neuter
      - common

  grammar_number:
    type: string
    description: The grammatical number of the designation.
    enum:
      - singular
      - dual
      - plural
      - mass
      - other_number

  grammar_info:
    type: object
    description: Grammatical information about a designation.
    properties:
      gender:
        $ref: "#/$defs/grammar_gender"
      number:
        $ref: "#/$defs/grammar_number"
      preposition:
        type: boolean
        description: The designation is a preposition.
      participle:
        type: boolean
        description: The designation is a participle.
      adj:
        type: boolean
        description: The designation is an adjective.
      verb:
        type: boolean
        description: The designation is a verb.
      adverb:
        type: boolean
        description: The designation is an adverb.
      noun:
        type: boolean
        description: The designation is a noun.
      part_of_speech:
        $ref: "#/$defs/part_of_speech"

  concept_status:
    type: string
    description: Status of the concept
    enum:
      - draft
      - submitted
      - not_valid
      - invalid
      - valid
      - superseded
      - retired

  concept_date:
    type: object
    description: A governance event in the lifecycle of the localized concept.
    properties:
      date:
        type: string
        format: date
      type:
        type: string
        enum:
          - accepted
          - amended
          - retired
          - review
          - review_decision
      event_description:
        type: string
        description: MANAGEMENT — Free-text description of the governance event.

  concept_source_statuses:
    type: string
    description: Status of the concept source
    enum:
      - identical
      - similar
      - modified
      - restyle
      - context_added
      - generalisation
      - specialisation
      - unspecified
      - related
      - not_equal

  concept_source_types:
    type: string
    description: Type of the concept source
    enum:
      - authoritative
      - lineage

  concept_source:
    type: object
    description: |
      Bibliographic reference for a concept or designation.
      May carry an optional `id` for inline reference via
      `{{cite:id}}` mentions in the concept's text.
    properties:
      id:
        type: string
        description: |
          Optional stable identifier for the source, used by
          inline `{{cite:id}}` references in the concept's
          text.
      status:
        $ref: "#/$defs/concept_source_statuses"
      type:
        $ref: "#/$defs/concept_source_types"
      origin:
        $ref: "#/$defs/citation"
      modification:
        type: string
        description: Modification of the concept source

  # Reference (typed classification — domains, typed references)
  reference:
    type: object
    description: |
      A typed reference to an item within a collection. Used for domain
      classification and typed references. For bibliographic citations,
      use citation; for concept links in relationships, use concept_ref.
    properties:
      source:
        type: string
        description: Collection identifier (document series, termbase, vocabulary).
      id:
        type: string
        description: Item identifier within the collection (document ID, concept ID).
      concept_id:
        type: string
        description: Alias for id (backward compatibility).
      version:
        type: string
        description: Version of the item or collection.
      locality:
        $ref: "#/$defs/locality"
      link:
        type: string
        description: URL link to the source document or concept.
      original:
        type: string
        description: Pre-parsed original text.
      custom_locality:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            value:
              type: string
      ref_type:
        type: string
        description: Type qualifier (domain, local, urn, designation).
      urn:
        type: string
        description: Direct URN reference.
      term:
        type: string
        description: Term text when referencing a concept.

  # Citation (bibliographic — used in ConceptSource#origin)
  citation:
    type: object
    description: |
      A bibliographic citation. The `ref` field is always a structured hash
      (Citation::Ref) identifying the source document.
    properties:
      ref:
        $ref: "#/$defs/citation_ref"
      locality:
        $ref: "#/$defs/locality"
      link:
        type: string
        description: URL link to the source document.
      original:
        type: string
        description: Pre-parsed original citation text.
      custom_locality:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            value:
              type: string

  # Citation::Ref (always a hash in V3)
  citation_ref:
    type: object
    description: |
      Inner reference of a Citation. Always a structured hash with source,
      id, and optional version. Never a plain string in V3.
    properties:
      source:
        type: string
        description: Document series or termbase (e.g. "ISO", "IEC").
      id:
        type: string
        description: Document identifier within the series (e.g. "1087-1:2000").
      version:
        type: string
        description: Version of the document.

  # ConceptRef (used in RelatedConcept#ref)
  concept_ref:
    type: object
    description: |
      A concept reference used in related concept entries.
      Has source, id, and optional text. No version, locality, or link.
    properties:
      source:
        type: string
        description: Registry or vocabulary identifier.
      id:
        type: string
        description: Concept identifier within the registry.
      text:
        type: string
        description: Target designation text for lexical relationships.

  locality:
    type: object
    description: A locality within a cited document.
    properties:
      type:
        type: string
        description: Type of the locality (section, clause, page, etc.)
      reference_from:
        type: string
      reference_to:
        type: string

  detailed_definition:
    type: object
    description: A definition, note, or example with optional sources.
    properties:
      content:
        type: string
        description: The text content.
      sources:
        type: array
        items:
          $ref: "#/$defs/concept_source"
        description: Bibliographic references for this content.

  related_concept:
    type: object
    description: A concept related to the current concept or localization.
    properties:
      type:
        type: string
        description: The type of relationship.
      ref:
        $ref: "#/$defs/concept_ref"
      content:
        type: string
        description: Text describing the relationship.

  designation_relationship:
    type: object
    description: A designation-level relationship between designations of the same concept.
    properties:
      type:
        type: string
        description: The type of designation relationship.
        enum:
          - abbreviated_form_for
          - short_form_for
      content:
        type: string
        description: Text describing the designation relationship.
      target:
        type: string
        description: The target designation text that this designation relates to.
    required:
      - type

  # Data Types
  iso639_three_char_code:
    type: string
    minLength: 3
    maxLength: 3
    description: Three digit ISO-639 language code
    examples:
      - eng
      - ara
      - fra
      - deu

  iso3166_code:
    type: string
    description: The ISO-3166 Code for geographic area
    examples:
      - DE
      - US

  iso15924_code:
    type: string
    description: The ISO-15924 script code
    examples:
      - Latn
      - Arab
      - Cyrl

  iso24229_code:
    type: string
    description: The ISO-24229 conversion system code
    examples:
      - pinyin
      - romaji
      - ISO

  language_code:
    $ref: "#/$defs/iso639_three_char_code"

  # Non-verbal representation
  non_verbal_rep:
    type: object
    description: A non-verbal representation of the term.
    properties:
      type:
        type: string
        description: Type of representation.
        enum:
          - image
          - table
          - formula
      ref:
        type: string
        description: URI or path to the resource.
      text:
        type: string
        description: Alt text or description.
      sources:
        type: array
        items:
          $ref: "#/$defs/concept_source"
        description: Bibliographic source for the non-verbal representation.

  # Register (ISO 12620 / TBX-Linguist)
  register:
    type: string
    description: Register or usage level of the designation (ISO 12620 / TBX-Linguist).
    enum:
      - colloquial_register
      - neutral_register
      - technical_register
      - in_house_register
      - bench_level_register
      - slang_register
      - vulgar_register

  # Part of speech (ISO 12620 / TBX)
  part_of_speech:
    type: string
    description: Part of speech classification of the designation.
    enum:
      - noun
      - verb
      - adj
      - adverb
      - preposition
      - participle
