%YAML 1.1
---
$id: "https://github.com/glossarist/concept-model/v3/concept"
title: YAML Schema for Concept model (v3)
description: |
  A metaschema for glossarist concept model V3.
type: object
properties:
  id:
    type: string
    description: A management identifier for the concept
    examples:
      - '1234'
      - 12969ded-ba28-48de-b009-1f1140236c60
  data:
    type: object
    description: Data related to the concept
    properties:
      identifier:
        type: string
        description: A unique identifier for the concept
        examples:
          - "1234"
          - "foobar"
      uri:
        type: string
        description: Optional URI for the concept
        examples:
          - "https://example.org/concepts/1234"
      localized_concepts:
        type: object
        description: Three digit language code followed by the `id` of the 
          localization for that language.
        examples:
          - eng: '1234'
          - ara: 39fcd2af-9ef1-4a69-71a4-2d3de569afce
        propertyNames:
          $ref: "#/$defs/iso639_three_char_code"
        additionalProperties:
          type: string
      domains:
        type: array
        items:
          $ref: "#/$defs/reference"
        description: Domain/subject area references (replaces legacy groups 
          field).
      tags:
        type: array
        items:
          type: string
        description: Organizational tags for grouping and filtering concepts 
          (not rendered as terminological domains).
      sources:
        type: array
        items:
          $ref: "#/$defs/concept_source"
        description: Zero or more bibliographical sources for the term.
      dates:
        type: array
        items:
          $ref: "#/$defs/concept_date"
        description: Dates in the lifecycle of the management of the term.
  related:
    type: array
    items:
      $ref: "#/$defs/related_concept"
    description: Zero or more binary related concepts at the concept level.
  partitive_relations:
    type: array
    items:
      $ref: "#/$defs/partitive_relation"
    description: |
      Zero or more ISO 704 / 1087-1 / 12620 partitive relations.
      Each entry connects this concept (as comprehensive —
      superordinate concept partitive) to two or more partitive
      concepts (subordinate concepts partitive) which fitted
      together constitute the comprehensive.

      Independent of `related` (which is binary). A concept may
      have both. PartitiveRelation is used when the source diagram
      depicts a rake whose membership, completeness, or plurality
      is jointly significant.

      For single pairwise part-of assertions without completeness
      claims, use the binary has_part / is_part_of edge instead.
  sources:
    type: array
    items:
      $ref: "#/$defs/concept_source"
    description: Concept-level bibliographical sources.
  status:
    $ref: "#/$defs/concept_status"
  date_accepted:
    type: string
    format: date-time
    description: Date and time when the concept was accepted.
    examples:
      - "2021-05-01T00:00:00+00:00"

allOf:
  # ExternalConcept conditional: when status is 'external', the
  # data block must NOT include definition or sources (those would
  # contradict the external status). When status is anything else,
  # the data block must include designations and definition per
  # the normal ManagedConcept contract.
  - if:
      properties:
        status:
          const: external
    then:
      properties:
        data:
          properties:
            definition:
              not: {}
            sources:
              not: {}
          required: [identifier, designations]

$defs:
  # Concept Status enum
  concept_status:
    type: string
    description: The normative status of the managed term.
    enum:
      - draft
      - submitted
      - not_valid
      - invalid
      - valid
      - superseded
      - retired
      - external

  # Concept Date
  concept_date:
    type: object
    description: A date relevant to the lifecycle of the managed term.
    properties:
      date:
        type: string
        format: date
        description: The date associated with the managed term.
      type:
        $ref: "#/$defs/concept_date_type"
    required:
      - date
      - type

  # Concept Date Type enum
    additionalProperties: false
  concept_date_type:
    type: string
    description: Kinds of governance events associated with the lifecycle of a 
      managed term.
    enum:
      - accepted
      - amended
      - retired
      - review
      - review_decision

  # Related Concept
  related_concept:
    type: object
    description: A concept related to the current concept with a typed 
      relationship.
    properties:
      type:
        $ref: "#/$defs/related_concept_type"
      ref:
        $ref: "#/$defs/concept_ref"
      content:
        type: object
        additionalProperties:
          type: string
        description: |
          Free-form localized text describing the relationship, keyed
          by ISO 639 language code: `{ "eng": "...", "fra": "..." }`.

          All free-form text fields in Glossarist are localized —
          the project is multi-language by domain. Plain strings are
          NOT accepted; wrap single-language text as
          `{ "eng": "..." }`.

  # Related Concept Type enum
    additionalProperties: false
  related_concept_type:
    type: string
    description: The relation of a term to the current term.
    enum:
      # Lifecycle (ISO 10241-1 / ISO 19135)
      - deprecates
      - deprecated_by
      - supersedes
      - superseded_by
      - replaces
      - replaced_by
      - invalidates
      - invalidated_by
      - retires
      - retired_by
      # Hierarchical — generic (SKOS)
      - broader
      - narrower
      - broader_generic
      - narrower_generic
      # Hierarchical — partitive (ISO 25964 / ISO 19135)
      - broader_partitive
      - narrower_partitive
      - has_part
      - is_part_of
      # Hierarchical — instantial (ISO 25964 / ISO 19135)
      - broader_instantial
      - narrower_instantial
      - instance_of
      - has_instance
      # Equivalence (ISO 10241-1 / SKOS)
      - equivalent
      - exact_match
      # Approximate / mapping (SKOS)
      - close_match
      - broad_match
      - narrow_match
      - related_match
      # Associative (ISO 10241-1 / ISO 25964)
      - see
      - references
      - related_concept
      - related_concept_broader
      - related_concept_narrower
      # Comparative (ISO 10241-1)
      - compare
      - contrast
      # Spatiotemporal (ISO 25964 / TBX)
      - sequentially_related
      - spatially_related
      - temporally_related
      # Lexical (ISO 12620 / TBX)
      - homograph
      - false_friend
      # Register management (ISO 19135)
      - has_concept
      - is_concept_of
      - has_definition
      - definition_of
      - inherits
      - inherited_by
      # Versioning / definitional (ISO 19135)
      - has_version
      - version_of
      - current_version
      - current_version_of
      # Designation-level (ISO 10241-1)
      - abbreviated_form_for
      - short_form_for
      # ExternalConcept resolution (Glossarist extension)
      - provides
      - provided_by

  # Reference (typed classification — domains, typed references)
  reference:
    type: object
    description: |
      A typed reference to an item within a collection. Used for domain
      classification and typed references. For bibliographic citations,
      use citation; for concept links in relationships, use concept_ref.
    properties:
      source:
        type: string
        description: Collection identifier (document series, termbase, 
          vocabulary).
      id:
        type: string
        description: Item identifier within the collection (document ID, concept
          ID).
      concept_id:
        type: string
        description: Alias for id (backward compatibility).
      version:
        type: string
        description: Version of the item or collection.
      locality:
        $ref: "#/$defs/locality"
      link:
        type: string
        description: URL link to the source document or concept.
      original:
        type: string
        description: Pre-parsed original text.
      custom_locality:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            value:
              type: string
      ref_type:
        type: string
        description: Type qualifier (domain, local, urn, designation).
      urn:
        type: string
        description: Direct URN reference.
      term:
        type: string
        description: Term text when referencing a concept.

  # Citation (bibliographic — used in ConceptSource#origin)
    additionalProperties: false
  citation:
    type: object
    description: |
      A bibliographic citation. The `ref` field is always a structured hash
      (Citation::Ref) identifying the source document. This is the V3 canonical
      format — plain string refs are supported only via V2 backward compatibility.
    properties:
      ref:
        $ref: "#/$defs/citation_ref"
      locality:
        $ref: "#/$defs/locality"
      link:
        type: string
        description: URL link to the source document.
      original:
        type: string
        description: Pre-parsed original citation text.
      custom_locality:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            value:
              type: string

  # Citation::Ref (always a hash in V3)
  citation_ref:
    type: object
    description: |
      Inner reference of a Citation. Always a structured hash with source,
      id, and optional version. Never a plain string in V3.
    properties:
      source:
        type: string
        description: Document series or termbase (e.g. "ISO", "IEC").
      id:
        type: string
        description: Document identifier within the series (e.g. "1087-1:2000").
      version:
        type: string
        description: Version of the document.

  # ConceptRef (used in RelatedConcept#ref, PartitiveMember#ref,
  # TypeSharedPlurality#shared_type, and standalone as ExternalConcept placeholder)
  concept_ref:
    type: object
    description: |
      A concept reference. Three forms:
        1. (source, id, text) — fully resolved, with optional
           display text
        2. (source, id) — resolved
        3. (text) — text-only placeholder for an ExternalConcept
           (ManagedConcept with status: external)

      Form 3 is for inline convenience in authored YAML. The
      deserializer creates or looks up an ExternalConcept with
      that text as its preferred designation.
    properties:
      source:
        type: string
        description: Registry or vocabulary identifier (e.g. "IEC", "ISO").
      id:
        type: string
        description: Concept identifier within the registry (e.g. "102-01-01").
      text:
        type: string
        description: Target designation text for lexical relationships, or the placeholder label for an unresolved ExternalConcept.
    anyOf:
      - required: [source, id]
      - required: [text]
    additionalProperties: false

  # Completeness enum
  completeness:
    type: string
    description: |
      Whether the partitives of a PartitiveRelation fitted together
      constitute the whole comprehensive concept (complete) or only
      some of it (partial — other partitives exist that are not
      encoded).
    enum:
      - complete
      - partial

  # Member Certainty enum (Glossarist extension beyond ISO notation)
  member_certainty:
    type: string
    description: |
      Per-partitive certainty within a PartitiveRelation. Allows
      cases like "A is composed of {b, c} (confirmed) and {d}
      (possible)" within one relation.
    enum:
      - confirmed
      - possible

  # Concept reference — used by PartitiveMember, RelatedConcept,
  # and as standalone text-only placeholder for ExternalConcept.
  # (Defined earlier in this file.)

  # Partitive Member
  partitive_member:
    type: object
    description: |
      One member of a PartitiveRelation — a partitive concept plus
      optional certainty metadata.
    properties:
      ref:
        $ref: "#/$defs/concept_ref"
      certainty:
        $ref: "#/$defs/member_certainty"
        default: confirmed
    required:
      - ref
    additionalProperties: false

  # Type-Shared Plurality
  type_shared_plurality:
    type: object
    description: |
      Type-shared plurality claim encoded by ISO 704's close-set
      double line (is_shared) and broken line (is_uncertain).
      Promoted from diagram-notation markers to structured data.
    properties:
      is_shared:
        type: boolean
        description: |
          ISO 704 close-set double line. True when several
          partitives of a given type are involved. Distinct from
          cardinality alone — three partitives of different types
          do not satisfy this.
      is_uncertain:
        type: boolean
        default: false
        description: |
          ISO 704 broken line. True when the type-shared plurality
          is uncertain. Requires is_shared = true for semantic
          coherence.
      shared_type:
        $ref: "#/$defs/concept_ref"
        description: |
          Glossarist extension. The type the partitives share, when
          known. ISO notation does not encode this. Optional even
          when is_shared is true.
    required:
      - is_shared
    additionalProperties: false

  # Partitive Relation (ISO 704 / 1087-1 / 12620)
  partitive_relation:
    type: object
    description: |
      ISO 704 / 1087-1 / 12620 partitive relation. Connects a
      comprehensive concept to two or more partitive concepts which
      fitted together constitute the comprehensive. Shown as a rake
      or bracket in source diagrams.

      All partitives within one relation are coordinate concepts
      (ISO 12620): they share the comprehensive AND the criterion
      of subdivision.

      Glossarist extensions: MemberCertainty (per-partitive),
      TypeSharedPlurality.shared_type, criterion as structured data.
    properties:
      comprehensive:
        $ref: "#/$defs/concept_ref"
      partitives:
        type: array
        minItems: 2
        items:
          $ref: "#/$defs/partitive_member"
        description: |
          The subordinate concepts partitive — the parts. ISO 704
          requires "two or more." A single partitive should be
          expressed as a binary has_part edge instead.
      completeness:
        $ref: "#/$defs/completeness"
        default: complete
        description: |
          Completeness of the partitives list. `complete` (default)
          asserts that the encoded partitives fitted together
          constitute the comprehensive. `partial` asserts that
          other partitives exist beyond those encoded.
      plurality:
        $ref: "#/$defs/type_shared_plurality"
        description: |
          Optional type-shared plurality claim. Absent means no
          such claim is made. Encodes ISO 704's close-set double
          line and broken line as data.
      criterion:
        type: object
        description: |
          The subdivision criterion for this relation. ISO 12620
          coordinate-concept coherence: partitives within one
          relation share the comprehensive AND the criterion. Two
          PartitiveRelations on the same comprehensive with the
          same criterion are duplicates (validation error).

          Multilingual: keys are ISO 639 language codes.
        additionalProperties:
          type: string
        propertyNames:
          $ref: "#/$defs/iso639_three_char_code"
    required:
      - comprehensive
      - partitives
    additionalProperties: false

  # Concept Source
  concept_source:
    type: object
    description: |
      Bibliographic reference for a concept or designation.
      May carry an optional `id` for inline reference via
      `{{cite:id}}` mentions in the concept's text.
    properties:
      id:
        type: string
        description: |
          Optional stable identifier for the source, used by
          inline `{{cite:id}}` references in the concept's
          text. The id is local to the concept; it must be
          unique within the concept's sources list (across
          concept-level, localization-level, and
          designation-level sources).
      type:
        $ref: "#/$defs/concept_source_type"
      status:
        $ref: "#/$defs/concept_source_status"
      origin:
        $ref: "#/$defs/citation"
      modification:
        type: string
        description: How the concept was modified from the source.
      sourced_from:
        type: array
        description: |
          Citations to the documents that this source was itself sourced
          from. Only valid on sources of type `lineage`; authoritative
          sources are terminal. When present, `status` and `modification`
          describe how `origin` relates to these upstream sources.
          Each citation MUST include a `locality` so the reader can
          locate the definition in the upstream document.
        items:
          allOf:
            - $ref: "#/$defs/citation"
          required:
            - ref
            - locality

  # Concept Source Type enum
    additionalProperties: false
  concept_source_type:
    type: string
    description: Type of concept source.
    enum:
      - authoritative
      - lineage

  # Concept Source Status enum
  concept_source_status:
    type: string
    description: The status of the managed term relative to the source.
    enum:
      - identical
      - similar
      - modified
      - restyle
      - context_added
      - generalisation
      - specialisation
      - unspecified
      - related
      - not_equal

  # Locality
  locality:
    type: object
    description: A locality within a cited document.
    properties:
      type:
        type: string
        description: Type of the locality (section, clause, page, etc.)
      reference_from:
        type: string
      reference_to:
        type: string

  # Data Types
    additionalProperties: false
  iso639_three_char_code:
    type: string
    minLength: 3
    maxLength: 3
    description: Three digit ISO-639 language code
    examples:
      - eng
      - ara
      - fra
      - deu
