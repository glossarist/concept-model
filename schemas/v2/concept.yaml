%YAML 1.1
# yaml-language-server: $schema=http://json-schema.org/draft-07/schema
---
$id: "https://github.com/glossarist/concept-model/concept"
title: YAML Schema for Concept model
description: |
  A metaschema for glossarist concept model V2.
type: object
properties:
  id:
    type: string
    description: A management identifier for the concept
    examples:
      - '1234'
      - 12969ded-ba28-48de-b009-1f1140236c60
  data:
    type: object
    description: Data related to the concept
    properties:
      identifier:
        type: string
        description: A unique identifier for the concept
        examples:
          - "1234"
          - "foobar"
      uri:
        type: string
        description: Optional URI for the concept
        examples:
          - "https://example.org/concepts/1234"
      localized_concepts:
        type: object
        description: Three digit language code followed by the `id` of the localization for that language.
        examples:
          - eng: '1234'
          - ara: 39fcd2af-9ef1-4a69-71a4-2d3de569afce
        propertyNames:
          $ref: "#/$defs/iso639_three_char_code"
        additionalProperties:
          type: string
      domains:
        type: array
        items:
          $ref: "#/$defs/concept_reference"
        description: Domain/subject area references (replaces legacy groups field).
      related:
        type: array
        items:
          $ref: "#/$defs/related_concept"
        description: Zero or more terms related to the current term.
      sources:
        type: array
        items:
          $ref: "#/$defs/concept_source"
        description: Zero or more bibliographical sources for the term.
      dates:
        type: array
        items:
          $ref: "#/$defs/concept_date"
        description: Dates in the lifecycle of the management of the term.
  status:
    $ref: "#/$defs/concept_status"
  date_accepted:
    type: string
    format: date-time
    description: Date and time when the concept was accepted.
    examples:
      - "2021-05-01T00:00:00+00:00"

$defs:
  # Concept Status enum
  concept_status:
    type: string
    description: The normative status of the managed term.
    enum:
      - draft
      - submitted
      - not_valid
      - invalid
      - valid
      - superseded
      - retired

  # Concept Date
  concept_date:
    type: object
    description: A date relevant to the lifecycle of the managed term.
    properties:
      date:
        type: string
        format: date
        description: The date associated with the managed term.
      type:
        $ref: "#/$defs/concept_date_type"
    required:
      - date
      - type

  # Concept Date Type enum
  concept_date_type:
    type: string
    description: Kinds of events associated with the lifecycle of a managed term on nominated dates.
    enum:
      - accepted
      - amended
      - retired

  # Related Concept
  related_concept:
    type: object
    description: A term related to the current term.
    properties:
      type:
        $ref: "#/$defs/related_concept_type"
      ref:
        description: Reference to the related concept
        oneOf:
          - type: string
          - $ref: "#/$defs/concept_reference"
      content:
        type: string
        description: Content describing the relationship

  # Related Concept Type enum
  related_concept_type:
    type: string
    description: The relation of a term to the current term.
    enum:
      # Lifecycle
      - deprecates
      - supersedes
      - superseded_by
      # Hierarchical (SKOS)
      - broader
      - narrower
      # ISO 25964 generic
      - broader_generic
      - narrower_generic
      # ISO 25964 partitive
      - broader_partitive
      - narrower_partitive
      # ISO 25964 instantial
      - broader_instantial
      - narrower_instantial
      # SKOS mapping
      - equivalent
      - close_match
      - broad_match
      - narrow_match
      - related_match
      # Associative (SKOS)
      - see
      - related_concept
      - related_concept_broader
      - related_concept_narrower
      # Comparative
      - compare
      - contrast
      # Spatiotemporal
      - sequentially_related
      - spatially_related
      - temporally_related
      # Lexical
      - homograph
      - false_friend
      # Designation-level
      - abbreviated_form_for
      - short_form_for

  # Concept Reference
  concept_reference:
    type: object
    description: A typed reference to another concept (local or external).
    properties:
      concept_id:
        type: string
        description: The target concept identifier.
      source:
        type: string
        description: URN prefix for external references.
      ref_type:
        type: string
        description: The type of reference (domain, relationship, etc.).
      urn:
        type: string
        description: Direct URN reference.

  # Concept Source
  concept_source:
    type: object
    description: Bibliographic reference for a concept or designation
    properties:
      type:
        $ref: "#/$defs/concept_source_type"
      status:
        $ref: "#/$defs/concept_source_status"
      origin:
        $ref: "#/$defs/citation"
      modification:
        type: string
        description: How the concept was modified from the source.

  # Concept Source Type enum
  concept_source_type:
    type: string
    description: Type of concept source.
    enum:
      - authoritative
      - lineage

  # Concept Source Status enum
  concept_source_status:
    type: string
    description: The status of the managed term relative to the source.
    enum:
      - identical
      - similar
      - modified
      - restyle
      - context_added
      - generalisation
      - specialisation
      - unspecified
      - related
      - not_equal

  # Citation
  citation:
    type: object
    description: A bibliographic citation.
    properties:
      text:
        type: string
      source:
        type: string
      id:
        type: string
      version:
        type: string
      locality:
        $ref: "#/$defs/locality"
      link:
        type: string
      original:
        type: string
      ref:
        description: Reference identifier (string or structured hash).
        oneOf:
          - type: string
          - type: object
            properties:
              source:
                type: string
              id:
                type: string
              version:
                type: string
      clause:
        type: string
      custom_locality:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            value:
              type: string

  # Locality
  locality:
    type: object
    description: A locality within a cited document.
    properties:
      type:
        type: string
        description: Type of the locality (section, clause, page, etc.)
      reference_from:
        type: string
      reference_to:
        type: string

  # Data Types
  iso639_three_char_code:
    type: string
    minLength: 3
    maxLength: 3
    description: Three digit ISO-639 language code
    examples:
      - eng
      - ara
      - fra
      - deu
